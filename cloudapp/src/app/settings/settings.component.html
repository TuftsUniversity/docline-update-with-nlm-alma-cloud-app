<ng-template #loading_spinner>
  <div class="loading-shade">
    <mat-progress-spinner
      mode="indeterminate"
      diameter="50"
    ></mat-progress-spinner>
  </div>
</ng-template>

<section class="settings-page">
  <form
    (ngSubmit)="onSubmit(form)"
    #form="ngForm"
    *ngIf="!loading && config; else loading_spinner"
    class="settings-form"
  >
    <div class="eca-actions">
      <a [routerLink]="['']" style="float: right">
         <button mat-flat-button color="secondary">
          <mat-icon>arrow_back</mat-icon>Back
        </button>
      </a>

      <button
        mat-flat-button
        color="secondary"
        type="button"
        (click)="onRestore()"
        style="margin-left: 4px"
      >
        Restore Defaults
      </button>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="!form.valid"
      >
        Save
      </button>
    </div>

    <div class="settings-card">
      <h1>Docline Settings</h1>

      <p class="settings-note">
        These settings will apply to all records in the set generated by this tool.
      </p>

      <div class="form-row">
        <mat-form-field appearance="fill" class="form-field">
          <mat-label>LIBID</mat-label>
          <input
            matInput
            name="doclineLibid"
            [(ngModel)]="config.doclineConfig.libid"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="fill" class="form-field">
          <mat-label>Retention Policy</mat-label>
          <input
            matInput
            name="retentionPolicy"
            [(ngModel)]="config.doclineConfig.retention_policy"
          />
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="fill" class="form-field">
          <mat-label>Limited Retention Period</mat-label>
          <input
            matInput
            type="number"
            name="limitedRetentionPeriod"
            [(ngModel)]="config.doclineConfig.limited_retention_period"
          />
        </mat-form-field>

        <mat-form-field appearance="fill" class="form-field">
          <mat-label>Limited Retention Type</mat-label>
          <mat-select
            name="limitedRetentionType"
            [(ngModel)]="config.doclineConfig.limited_retention_type"
          >
            <mat-option value="">Blank</mat-option>
            <mat-option value="Days">Days</mat-option>
            <mat-option value="Weeks">Weeks</mat-option>
            <mat-option value="Months">Months</mat-option>
            <mat-option value="Years">Years</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="fill" class="form-field">
          <mat-label>Has EPUB Ahead of Print</mat-label>
          <mat-select
            name="hasEpubAheadOfPrint"
            [(ngModel)]="config.doclineConfig.has_epub_ahead_of_print"
          >
            <mat-option value="No">No</mat-option>
            <mat-option value="Yes">Yes</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="fill" class="form-field">
          <mat-label>Has Supplements</mat-label>
          <mat-select
            name="hasSupplements"
            [(ngModel)]="config.doclineConfig.has_supplements"
          >
            <mat-option value="No">No</mat-option>
            <mat-option value="Yes">Yes</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-row single-row">
        <mat-form-field appearance="fill" class="form-field">
          <mat-label>Ignore Warnings</mat-label>
          <mat-select
            name="ignoreWarnings"
            [(ngModel)]="config.doclineConfig.ignore_warnings"
          >
            <mat-option value="No">No</mat-option>
            <mat-option value="Yes">Yes</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
  </form>
</section>
