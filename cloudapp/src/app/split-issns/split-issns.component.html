<div style="display:flex; justify-content: space-between; align-items:center; gap:8px;">
  <div>
    <button
      mat-flat-button
      type="button"
      color="primary"
      (click)="handleUpload()"
      [disabled]="analyticsFiles.length === 0 || doclineFiles.length === 0 || loading"
    >
      Process Files
    </button>
  </div>
</div>

<h1>Docline Holdings Processor</h1>

<!-- Analytics CSV upload -->
<h3>Analytics CSV Files</h3>

<div>
  <ngx-dropzone
    (change)="onSelectAnalytics($event)"
    accept=".csv,text/csv"
    [multiple]="true"
  >
    <ngx-dropzone-label>
      Drag Analytics CSV files here
    </ngx-dropzone-label>

    <ngx-dropzone-preview
      *ngFor="let f of analyticsFiles"
      [removable]="true"
      (removed)="onRemoveAnalytics(f)"
    >
      <ngx-dropzone-label>{{ f.name }}</ngx-dropzone-label>
    </ngx-dropzone-preview>
  </ngx-dropzone>
</div>

<br />

<!-- Docline CSV upload -->
<h3>Current Docline Holdings CSV</h3>

<div>
  <ngx-dropzone
    (change)="onSelectDocline($event)"
    accept=".csv,text/csv"
    [multiple]="false"
  >
    <ngx-dropzone-label>
      Drag current Docline holdings CSV here
    </ngx-dropzone-label>

    <ngx-dropzone-preview
      *ngFor="let f of doclineFiles"
      [removable]="true"
      (removed)="onRemoveDocline(f)"
    >
      <ngx-dropzone-label>{{ f.name }}</ngx-dropzone-label>
    </ngx-dropzone-preview>
  </ngx-dropzone>
</div>

<br />

<!-- Status message -->
<div *ngIf="statusMessage">
  <h3>Status</h3>
  <p style="white-space: pre-line">{{ statusMessage }}</p>
</div>

<!-- Download link -->
<div *ngIf="downloadUrl">
  <h3>Output</h3>

  <button
    mat-flat-button
    type="button"
    color="primary"
  >
    <a [href]="downloadUrl" target="_blank" style="color:white; text-decoration:none;">
      Download Output ZIP
    </a>
  </button>
</div>

<br />

<!-- Preview table -->
<div *ngIf="finalRows.length > 0">

  <h3>Preview (first 25 rows)</h3>

  <div style="overflow-x:auto; max-height:500px;">

    <table
      mat-table
      [dataSource]="finalRows.slice(0,25)"
      class="mat-elevation-z2"
      style="width:100%; min-width:1200px;"
    >

      <ng-container
        *ngFor="let col of previewColumns"
        [matColumnDef]="col"
      >
        <th mat-header-cell *matHeaderCellDef>
          {{ col }}
        </th>

        <td mat-cell *matCellDef="let row">
          {{ row[col] }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="previewColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: previewColumns;"></tr>

    </table>

  </div>

</div>

<!-- spinner -->
<div class="loading-shade" *ngIf="loading">
  <mat-spinner diameter="50"></mat-spinner>
</div>
